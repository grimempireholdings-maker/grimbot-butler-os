<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050607">
  <title>Maya Console</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/console/assets/console.css?v=0.13.0">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#conversation" data-view="conversation" aria-label="Open Conversation">
      <span class="brand-mark" aria-hidden="true">M</span>
      <span><strong>Maya</strong><small>Console</small></span>
    </a>
    <nav class="view-nav" aria-label="Console views">
      <button class="nav-button active" type="button" data-view="conversation" aria-current="page">Conversation</button>
      <button class="nav-button" type="button" data-view="briefing">Briefing</button>
    </nav>
    <div class="header-actions">
      <span class="health-status"><span id="health-dot" class="status-dot" aria-hidden="true"></span><span id="health-label">Connecting</span></span>
      <label class="developer-toggle"><input id="developer-mode" type="checkbox"> <span>Developer</span></label>
    </div>
  </header>

  <main class="console-shell">
    <section id="conversation-view" class="mode-view conversation-view" aria-labelledby="conversation-title">
      <h1 id="conversation-title" class="sr-only">Conversation with Maya</h1>
      <div id="status-tokens" class="status-tokens" aria-label="Live system status"></div>
      <div class="conversation-stage">
        <div id="chat-log" class="chat-log" aria-live="polite">
          <div class="welcome-message">
            <span class="welcome-orb" aria-hidden="true"></span>
            <p>Maya is here.</p>
          </div>
        </div>
        <form id="chat-form" class="composer">
          <label class="sr-only" for="chat-input">Message Maya</label>
          <textarea id="chat-input" maxlength="1000" rows="2" placeholder="Talk to Maya..." required></textarea>
          <div id="voice-status" class="voice-status" role="status" aria-live="polite">Voice ready</div>
          <div id="photo-status" class="photo-status" role="status" aria-live="polite" hidden></div>
          <div class="composer-bar">
            <div class="conversation-controls">
              <label class="ambient-toggle"><input id="ambient-mode" type="checkbox" checked> Ambient Mode</label>
              <select id="chat-mode" aria-label="Assistant persona">
                <option value="maya_chief_of_staff">Maya Chief of Staff</option>
                <option value="neutral_robot">Neutral Robot</option>
                <option value="quiet_observer">Quiet Observer</option>
              </select>
            </div>
            <div class="message-actions">
              <input id="photo-input" class="sr-only" type="file" accept="image/*" capture="environment">
              <label id="photo-button" class="photo-button" for="photo-input" data-state="idle" role="button" aria-label="Take or choose one photo">
                <span class="photo-indicator" aria-hidden="true"></span><span id="photo-label">Photo</span>
              </label>
              <button id="voice-button" class="voice-button" type="button" data-state="idle" aria-pressed="false" aria-label="Start push-to-talk">
                <span class="voice-indicator" aria-hidden="true"></span><span id="voice-label">Talk</span>
              </button>
              <button class="send-button" type="submit"><span>Send</span><span aria-hidden="true">&#8593;</span></button>
            </div>
          </div>
        </form>
      </div>
    </section>

    <section id="briefing-view" class="mode-view briefing-view" aria-labelledby="briefing-title" hidden>
      <div class="view-heading">
        <div><p class="section-kicker">Intentional overview</p><h1 id="briefing-title">Briefing</h1></div>
        <button id="generate-briefing" class="primary-button" type="button">Generate Briefing</button>
      </div>
      <div id="briefing-output" class="briefing-output" aria-live="polite"></div>
    </section>

    <section id="developer-view" class="mode-view developer-view" aria-labelledby="developer-title" hidden>
      <div class="view-heading">
        <div><p class="section-kicker">Architecture and review</p><h1 id="developer-title">Developer</h1></div>
      </div>
      <div id="developer-root" class="developer-grid"></div>
    </section>
  </main>

  <template id="developer-template">
    <section class="panel wide-panel" aria-labelledby="diagnostics-title">
      <div class="panel-heading">
        <div><p class="section-kicker">Latest conversation</p><h2 id="diagnostics-title">Conversation Diagnostics</h2></div>
        <button id="refresh-all" class="icon-button" type="button" title="Refresh all read-only panels" aria-label="Refresh all read-only panels">&#8635;</button>
      </div>
      <div id="conversation-diagnostics" class="result-box compact"><div class="empty-state">No conversation diagnostics yet.</div></div>
    </section>

    <section class="panel wide-panel" aria-labelledby="context-title">
      <div class="panel-heading">
        <div><p class="section-kicker">Chief of Staff context</p><h2 id="context-title">Julian's Operating Context</h2></div>
        <button class="icon-button panel-refresh" data-refresh="context" type="button" title="Refresh context" aria-label="Refresh context">&#8635;</button>
      </div>
      <div class="context-columns">
        <div><h3>Top Priorities</h3><div id="context-priorities" class="item-list"></div></div>
        <div><h3>Active Projects</h3><div id="context-projects" class="item-list"></div></div>
        <div><h3>Current Bottlenecks</h3><div id="context-bottlenecks" class="item-list"></div></div>
        <div><h3>Next Actions</h3><div id="context-actions" class="item-list"></div></div>
      </div>
      <div class="context-controls">
        <form id="context-search-form">
          <label class="field-label" for="context-search">Search context</label>
          <div class="control-row"><input id="context-search" maxlength="500" placeholder="Search projects, priorities, people, or decisions..." required><button class="secondary-button" type="submit">Search</button></div>
          <div id="context-search-result" class="result-box compact"><div class="empty-state">No context search yet.</div></div>
        </form>
        <form id="context-remember-form">
          <label class="field-label" for="context-remember">Remember this</label>
          <div class="control-row">
            <select id="context-type" aria-label="Context type"><option value="decision">Decision</option><option value="priority">Priority</option><option value="current_bottleneck">Current Bottleneck</option><option value="next_action">Next Action</option><option value="project">Project Note</option><option value="relationship">Relationship</option><option value="protocol">Protocol</option><option value="belief">Belief</option></select>
            <input id="context-name" maxlength="160" placeholder="Short name" required>
          </div>
          <textarea id="context-remember" maxlength="2000" rows="3" placeholder="Context to remember..." required></textarea>
          <div class="form-footer"><label class="check-label"><input id="context-verified" type="checkbox"> Verified by Julian</label><button class="secondary-button" type="submit">Remember</button></div>
        </form>
      </div>
    </section>

    <section class="panel wide-panel" aria-labelledby="workspace-title">
      <div class="panel-heading">
        <div><p class="section-kicker">Read-only digital awareness</p><h2 id="workspace-title">Workspace</h2></div>
        <button class="secondary-button panel-refresh" data-refresh="workspace" type="button">Refresh Workspace</button>
      </div>
      <div id="workspace-summary" class="workspace-summary"><div class="empty-state">Loading workspace...</div></div>
      <div class="split-view workspace-details"><div><h3>Recent Commits</h3><div id="workspace-commits" class="item-list"></div></div><div><h3>Warnings</h3><div id="workspace-warnings" class="item-list"></div></div></div>
      <form id="workspace-search-form" class="control-row"><label class="sr-only" for="workspace-search">Search workspace</label><input id="workspace-search" maxlength="200" placeholder="Search safe project files..." required><button class="secondary-button" type="submit">Search Workspace</button></form>
      <div id="workspace-search-result" class="result-box compact"><div class="empty-state">No workspace search yet.</div></div>
    </section>

    <section class="panel state-panel" aria-labelledby="state-title">
      <div class="panel-heading"><div><p class="section-kicker">Adaptive pressure</p><h2 id="state-title">Internal State</h2></div><button class="icon-button panel-refresh" data-refresh="state" type="button" title="Refresh state" aria-label="Refresh state">&#8635;</button></div>
      <div id="state-output" class="signal-grid"><div class="empty-state">Loading state...</div></div>
    </section>

    <section class="panel skills-panel" aria-labelledby="skills-title">
      <div class="panel-heading"><div><p class="section-kicker">Manual capabilities</p><h2 id="skills-title">Skills</h2></div><button class="icon-button panel-refresh" data-refresh="skills" type="button" title="Refresh skills" aria-label="Refresh skills">&#8635;</button></div>
      <form id="skill-form" class="control-row"><label class="sr-only" for="skill-select">Select skill</label><select id="skill-select" required><option value="">Loading skills...</option></select><select id="skill-permission" aria-label="Permission"><option value="suggest">Suggest</option><option value="observe">Observe</option><option value="ask_approval">Ask Approval</option><option value="execute">Execute</option></select><button class="secondary-button" type="submit">Run Skill</button></form>
      <label class="field-label" for="skill-inputs">Inputs JSON</label><textarea id="skill-inputs" class="code-input" rows="3">{}</textarea><div id="skills-output" class="result-box"><div class="empty-state">Select a skill to inspect it.</div></div>
    </section>

    <section class="panel wide-panel" aria-labelledby="dream-title">
      <div class="panel-heading"><div><p class="section-kicker">Human-reviewed reflection</p><h2 id="dream-title">Dreaming</h2></div><div class="button-group"><button class="icon-button panel-refresh" data-refresh="dream" type="button" title="Refresh dreaming data" aria-label="Refresh dreaming data">&#8635;</button><button id="run-dream" class="secondary-button" type="button">Run Dream Cycle</button></div></div>
      <div class="split-view"><div><h3>Facts</h3><div id="dream-facts" class="item-list"><div class="empty-state">Loading facts...</div></div></div><div><h3>Promotion Review</h3><div id="dream-promotions" class="item-list"><div class="empty-state">Loading promotions...</div></div></div></div>
      <div id="dream-result" class="inline-notice" hidden></div>
    </section>

    <section class="panel wide-panel" aria-labelledby="procedure-title">
      <div class="panel-heading"><div><p class="section-kicker">Storage and matching only</p><h2 id="procedure-title">Procedural Memory</h2></div><button class="icon-button panel-refresh" data-refresh="procedures" type="button" title="Refresh procedures" aria-label="Refresh procedures">&#8635;</button></div>
      <form id="procedure-match-form" class="control-row"><label class="sr-only" for="procedure-query">Test procedure matching</label><input id="procedure-query" maxlength="500" placeholder="Test a procedure trigger..." required><button class="secondary-button" type="submit">Match Only</button></form>
      <div id="procedure-match-result" class="result-box compact"><div class="empty-state">No match tested.</div></div>
      <div class="split-view"><div><h3>Active Procedures</h3><div id="procedures-list" class="item-list"><div class="empty-state">Loading procedures...</div></div></div><div><h3>Pending Review</h3><div id="procedures-pending" class="item-list"><div class="empty-state">Loading proposals...</div></div></div></div>
    </section>

    <section class="panel wide-panel" aria-labelledby="memory-title">
      <div class="panel-heading"><div><p class="section-kicker">Robot recall</p><h2 id="memory-title">Memory</h2></div><button class="icon-button panel-refresh" data-refresh="memory" type="button" title="Refresh memory" aria-label="Refresh memory">&#8635;</button></div>
      <form id="memory-query-form" class="control-row"><label class="sr-only" for="memory-query">Search relevant memory</label><input id="memory-query" maxlength="500" placeholder="Ask what Maya remembers..." required><button class="secondary-button" type="submit">Recall</button></form>
      <div id="memory-relevant" class="result-box compact"><div class="empty-state">No recall query yet.</div></div>
      <div class="memory-columns"><div><h3>Rooms</h3><div id="memory-rooms" class="item-list"></div></div><div><h3>Hazards</h3><div id="memory-hazards" class="item-list"></div></div><div><h3>Mess Zones</h3><div id="memory-mess" class="item-list"></div></div></div>
    </section>
  </template>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
  <script src="/console/assets/console.js?v=0.13.0" defer></script>
</body>
</html>
